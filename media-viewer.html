<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
  }

  #picker {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  #picker button {
    padding: 14px 32px;
    font-size: 18px;
    background: #333;
    color: #eee;
    border: 2px solid #555;
    border-radius: 8px;
    cursor: pointer;
  }

  #picker button:hover { background: #444; border-color: #888; }
  #picker p { color: #888; font-size: 14px; }

  /* ---------- toolbar ---------- */

  #toolbar {
    display: none;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    background: #222;
    border-bottom: 1px solid #333;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  #toolbar label { font-size: 13px; color: #aaa; }

  #density {
    width: 140px;
    accent-color: #6af;
  }

  #density-val { font-size: 13px; color: #888; min-width: 24px; }

  #preview-mode-btn {
    background: #333;
    color: #ccc;
    border: 1px solid #555;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }

  #preview-mode-btn:hover { background: #444; color: #fff; }

  #file-count { font-size: 13px; color: #666; margin-left: auto; }

  /* ---------- grid ---------- */

  #grid {
    display: none;
    padding: 12px;
    gap: 8px;
    grid-template-columns: repeat(5, 1fr);
  }

  .thumb {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    background: #222;
  }

  .thumb img, .thumb canvas { display: block; }

  #grid.preview-cover .thumb { aspect-ratio: 1; }
  #grid.preview-cover .thumb img, #grid.preview-cover .thumb canvas {
    width: 100%; height: 100%; object-fit: cover;
  }

  #grid.preview-natural .thumb { aspect-ratio: auto; }
  #grid.preview-natural .thumb img, #grid.preview-natural .thumb canvas {
    width: 100%; height: auto; object-fit: contain;
  }

  .thumb:hover { outline: 2px solid #6af; outline-offset: -2px; }

  /* ---------- lightbox ---------- */

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #lightbox.active { display: flex; }

  #lightbox .media-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  #lightbox .media-wrap.fit img,
  #lightbox .media-wrap.fit video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  #lightbox .media-wrap.fill img,
  #lightbox .media-wrap.fill video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* click zones */
  .zone {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 10;
  }

  .zone-left  { left: 0; width: 33.33%; cursor: w-resize; }
  .zone-right { right: 0; width: 33.33%; cursor: e-resize; }

  /* top bar */
  #lb-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px;
    gap: 16px;
    pointer-events: none;
  }

  #lb-top > * { pointer-events: auto; }

  #lb-filename {
    background: rgba(0,0,0,.55);
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 13px;
    color: #aaa;
    max-width: 50%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #lb-mode-toggle {
    background: rgba(0,0,0,.6);
    color: #ccc;
    border: 1px solid rgba(255,255,255,.15);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
  }

  #lb-mode-toggle:hover { background: rgba(255,255,255,.15); color: #fff; }

  #lb-close {
    position: absolute;
    right: 16px;
    background: rgba(0,0,0,.6);
    color: #ccc;
    border: none;
    font-size: 28px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    line-height: 1;
  }

  #lb-close:hover { background: rgba(255,255,255,.15); color: #fff; }

  /* counter */
  #lb-counter {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(0,0,0,.55);
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 14px;
    color: #aaa;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="picker">
  <button id="pick-btn">Choose media folder</button>
  <p>Supports jpg, png, gif, webp, bmp, mp4, webm, mov, avi, mkv, ogv</p>
  <input type="file" id="dir-input" webkitdirectory multiple hidden>
</div>

<div id="toolbar">
  <label for="density">Density:</label>
  <input type="range" id="density" min="4" max="200" value="24">
  <span id="density-val">24</span>
  <button id="preview-mode-btn">Cover</button>
  <span id="file-count"></span>
  <button id="change-folder-btn" style="background:#333;color:#ccc;border:1px solid #555;padding:3px 10px;border-radius:4px;font-size:13px;cursor:pointer;">Change folder</button>
</div>

<div id="grid" class="preview-cover"></div>

<div id="lightbox">
  <div id="lb-top">
    <span id="lb-filename"></span>
    <button id="lb-mode-toggle">Fill</button>
    <button id="lb-close">&times;</button>
  </div>
  <div class="zone zone-left" id="zone-left"></div>
  <div class="zone zone-right" id="zone-right"></div>
  <div class="media-wrap fit" id="media-wrap"></div>
  <div id="lb-counter"></div>
</div>

<script>
const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','ico','tif','tiff']);
const VIDEO_EXTS = new Set(['mp4','webm','mov','avi','mkv','ogv','m4v','3gp']);

function ext(name) {
  const i = name.lastIndexOf('.');
  return i === -1 ? '' : name.slice(i + 1).toLowerCase();
}

function mediaType(name) {
  const e = ext(name);
  if (IMAGE_EXTS.has(e)) return 'image';
  if (VIDEO_EXTS.has(e)) return 'video';
  return null;
}

let items = [];
let current = -1;
let fitMode = 'fit'; // 'fit' or 'fill'

// --- elements ---

const pickBtn    = document.getElementById('pick-btn');
const dirInput   = document.getElementById('dir-input');
const picker     = document.getElementById('picker');
const toolbar    = document.getElementById('toolbar');
const grid       = document.getElementById('grid');
const density    = document.getElementById('density');
const fileCount  = document.getElementById('file-count');

function loadFiles(fileList) {
  const files = Array.from(fileList)
    .filter(f => mediaType(f.name))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  if (!files.length) { alert('No supported media files found.'); return; }

  items.forEach(it => URL.revokeObjectURL(it.url));

  items = files.map(f => ({
    file: f,
    url: URL.createObjectURL(f),
    type: mediaType(f.name),
  }));

  picker.style.display = 'none';
  toolbar.style.display = 'flex';
  grid.style.display = 'grid';
  fileCount.textContent = `${items.length} files`;
  applyDensity();
  buildGrid();
}

pickBtn.addEventListener('click', () => dirInput.click());
document.getElementById('change-folder-btn').addEventListener('click', () => dirInput.click());
dirInput.addEventListener('change', () => loadFiles(dirInput.files));

// --- preview mode cycling ---

let previewMode = 'cover';
const previewBtn = document.getElementById('preview-mode-btn');

previewBtn.addEventListener('click', () => {
  previewMode = previewMode === 'cover' ? 'natural' : 'cover';
  grid.className = `preview-${previewMode}`;
  grid.style.display = 'grid';
  previewBtn.textContent = previewMode === 'cover' ? 'Cover' : 'Natural';
});

// --- configurable density ---

const densityVal = document.getElementById('density-val');
density.addEventListener('input', applyDensity);
window.addEventListener('resize', () => { if (items.length) applyDensity(); });

function applyDensity() {
  const target = parseInt(density.value, 10);
  densityVal.textContent = target;
  // compute columns so that ~target items fit in the viewport
  const vw = window.innerWidth;
  const vh = window.innerHeight - 45; // subtract toolbar height
  const aspect = vw / vh;
  const cols = Math.max(2, Math.round(Math.sqrt(target * aspect)));
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
}

// --- grid ---

function buildGrid() {
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const cell = document.createElement('div');
    cell.className = 'thumb';
    cell.addEventListener('click', () => openLightbox(i));

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.url;
      img.loading = 'lazy';
      cell.appendChild(img);
    } else {
      const canvas = document.createElement('canvas');
      cell.appendChild(canvas);
      grabVideoThumb(item.url, canvas);
    }

    grid.appendChild(cell);
  });
}

function grabVideoThumb(url, canvas) {
  const v = document.createElement('video');
  v.preload = 'metadata';
  v.muted = true;
  v.src = url;
  v.addEventListener('loadeddata', () => {
    v.currentTime = Math.min(1, v.duration * 0.1);
  });
  v.addEventListener('seeked', () => {
    canvas.width  = v.videoWidth;
    canvas.height = v.videoHeight;
    canvas.getContext('2d').drawImage(v, 0, 0);
  });
}

// --- lightbox ---

const lightbox    = document.getElementById('lightbox');
const mediaWrap   = document.getElementById('media-wrap');
const lbCounter   = document.getElementById('lb-counter');
const lbName      = document.getElementById('lb-filename');
const modeToggle  = document.getElementById('lb-mode-toggle');

function openLightbox(index) {
  current = index;
  lightbox.classList.add('active');
  showItem();
}

function closeLightbox() {
  lightbox.classList.remove('active');
  mediaWrap.innerHTML = '';
  current = -1;
}

function showItem() {
  mediaWrap.innerHTML = '';
  const item = items[current];

  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.url;
    mediaWrap.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.src = item.url;
    vid.controls = true;
    vid.autoplay = true;
    vid.loop = true;
    mediaWrap.appendChild(vid);
  }

  lbCounter.textContent = `${current + 1} / ${items.length}`;
  lbName.textContent = item.file.name;
}

function navigate(delta) {
  if (current === -1) return;
  current = (current + delta + items.length) % items.length;
  showItem();
}

// --- fit/fill toggle ---

function setMode(mode) {
  fitMode = mode;
  mediaWrap.classList.remove('fit', 'fill');
  mediaWrap.classList.add(mode);
  modeToggle.textContent = mode === 'fit' ? 'Fill' : 'Fit';
}

modeToggle.addEventListener('click', () => {
  setMode(fitMode === 'fit' ? 'fill' : 'fit');
});

// click zones
document.getElementById('zone-left').addEventListener('click', () => navigate(-1));
document.getElementById('zone-right').addEventListener('click', () => navigate(1));
document.getElementById('lb-close').addEventListener('click', closeLightbox);

// keyboard
document.addEventListener('keydown', (e) => {
  if (current === -1) return;
  if (e.key === 'ArrowLeft')  { navigate(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { navigate(1);  e.preventDefault(); }
  if (e.key === 'Escape')     { closeLightbox(); e.preventDefault(); }
  if (e.key === 'f')          { setMode(fitMode === 'fit' ? 'fill' : 'fit'); }
  if (e.key === 'm') {
    const vid = mediaWrap.querySelector('video');
    if (vid) vid.muted = !vid.muted;
  }
});
</script>
</body>
</html>
