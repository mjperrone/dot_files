<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    color: #eee;
    font-family: system-ui, -apple-system, sans-serif;
  }

  #picker {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  #picker button {
    padding: 14px 32px;
    font-size: 18px;
    background: #333;
    color: #eee;
    border: 2px solid #555;
    border-radius: 8px;
    cursor: pointer;
  }

  #picker button:hover { background: #444; border-color: #888; }

  #picker p { color: #888; font-size: 14px; }

  /* ---------- grid ---------- */

  #grid {
    display: none;
    padding: 12px;
    gap: 8px;
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }

  .thumb {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    background: #222;
  }

  .thumb img, .thumb canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,.7);
    color: #ccc;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .thumb:hover { outline: 2px solid #6af; outline-offset: -2px; }

  /* ---------- lightbox ---------- */

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  #lightbox.active { display: flex; }

  #lightbox .media-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  #lightbox img, #lightbox video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* click zones */
  .zone {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 10;
    cursor: pointer;
  }

  .zone-left  { left: 0; width: 33.33%; cursor: w-resize; }
  .zone-right { right: 0; width: 33.33%; cursor: e-resize; }

  /* close button */
  #lb-close {
    position: absolute;
    top: 12px;
    right: 16px;
    z-index: 20;
    background: rgba(0,0,0,.6);
    color: #ccc;
    border: none;
    font-size: 28px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    line-height: 1;
  }

  #lb-close:hover { background: rgba(255,255,255,.15); color: #fff; }

  /* counter */
  #lb-counter {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(0,0,0,.55);
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 14px;
    color: #aaa;
    pointer-events: none;
  }

  /* filename */
  #lb-filename {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: rgba(0,0,0,.55);
    padding: 4px 14px;
    border-radius: 12px;
    font-size: 13px;
    color: #aaa;
    pointer-events: none;
    max-width: 70%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div id="picker">
  <button id="pick-btn">Choose media folder</button>
  <p>Supports jpg, png, gif, webp, bmp, mp4, webm, mov, avi, mkv, ogv</p>
  <input type="file" id="dir-input" webkitdirectory multiple hidden>
</div>

<div id="grid"></div>

<div id="lightbox">
  <button id="lb-close">&times;</button>
  <div id="lb-filename"></div>
  <div class="zone zone-left" id="zone-left"></div>
  <div class="zone zone-right" id="zone-right"></div>
  <div class="media-wrap" id="media-wrap"></div>
  <div id="lb-counter"></div>
</div>

<script>
const IMAGE_EXTS = new Set(['jpg','jpeg','png','gif','webp','bmp','svg','avif','ico','tif','tiff']);
const VIDEO_EXTS = new Set(['mp4','webm','mov','avi','mkv','ogv','m4v','3gp']);

function ext(name) {
  const i = name.lastIndexOf('.');
  return i === -1 ? '' : name.slice(i + 1).toLowerCase();
}

function mediaType(name) {
  const e = ext(name);
  if (IMAGE_EXTS.has(e)) return 'image';
  if (VIDEO_EXTS.has(e)) return 'video';
  return null;
}

let items = [];   // { file, url, type, thumbUrl? }
let current = -1;

// --- directory picker ---

const pickBtn  = document.getElementById('pick-btn');
const dirInput = document.getElementById('dir-input');
const picker   = document.getElementById('picker');
const grid     = document.getElementById('grid');

pickBtn.addEventListener('click', () => dirInput.click());

dirInput.addEventListener('change', () => {
  const files = Array.from(dirInput.files)
    .filter(f => mediaType(f.name))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  if (!files.length) { alert('No supported media files found.'); return; }

  items = files.map(f => ({
    file: f,
    url: URL.createObjectURL(f),
    type: mediaType(f.name),
  }));

  picker.style.display = 'none';
  grid.style.display = 'grid';
  buildGrid();
});

// --- grid ---

function buildGrid() {
  grid.innerHTML = '';
  items.forEach((item, i) => {
    const cell = document.createElement('div');
    cell.className = 'thumb';
    cell.addEventListener('click', () => openLightbox(i));

    if (item.type === 'image') {
      const img = document.createElement('img');
      img.src = item.url;
      img.loading = 'lazy';
      cell.appendChild(img);
    } else {
      // video: grab a frame via canvas
      const canvas = document.createElement('canvas');
      cell.appendChild(canvas);
      grabVideoThumb(item.url, canvas);
    }

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = ext(item.file.name);
    cell.appendChild(badge);

    grid.appendChild(cell);
  });
}

function grabVideoThumb(url, canvas) {
  const v = document.createElement('video');
  v.preload = 'metadata';
  v.muted = true;
  v.src = url;
  v.addEventListener('loadeddata', () => {
    v.currentTime = Math.min(1, v.duration * 0.1);
  });
  v.addEventListener('seeked', () => {
    canvas.width  = v.videoWidth;
    canvas.height = v.videoHeight;
    canvas.getContext('2d').drawImage(v, 0, 0);
  });
}

// --- lightbox ---

const lightbox  = document.getElementById('lightbox');
const mediaWrap = document.getElementById('media-wrap');
const lbCounter = document.getElementById('lb-counter');
const lbName    = document.getElementById('lb-filename');

function openLightbox(index) {
  current = index;
  lightbox.classList.add('active');
  showItem();
}

function closeLightbox() {
  lightbox.classList.remove('active');
  mediaWrap.innerHTML = '';
  current = -1;
}

function showItem() {
  mediaWrap.innerHTML = '';
  const item = items[current];

  if (item.type === 'image') {
    const img = document.createElement('img');
    img.src = item.url;
    mediaWrap.appendChild(img);
  } else {
    const vid = document.createElement('video');
    vid.src = item.url;
    vid.controls = true;
    vid.autoplay = true;
    vid.loop = true;
    mediaWrap.appendChild(vid);
  }

  lbCounter.textContent = `${current + 1} / ${items.length}`;
  lbName.textContent = item.file.name;
}

function navigate(delta) {
  if (current === -1) return;
  current = (current + delta + items.length) % items.length;
  showItem();
}

// click zones
document.getElementById('zone-left').addEventListener('click', () => navigate(-1));
document.getElementById('zone-right').addEventListener('click', () => navigate(1));
document.getElementById('lb-close').addEventListener('click', closeLightbox);

// keyboard
document.addEventListener('keydown', (e) => {
  if (current === -1) return;
  if (e.key === 'ArrowLeft')  { navigate(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { navigate(1);  e.preventDefault(); }
  if (e.key === 'Escape')     { closeLightbox(); e.preventDefault(); }
});
</script>
</body>
</html>
